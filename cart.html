<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Bag</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="js/main.js"></script>
</head>
<body style="background-color: #fdeef0;">

    <nav class="navbar shadow-sm bg-white py-3 border-bottom">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="fw-bold text-decoration-none text-dark"><i class="bi bi-arrow-left me-2"></i>Continue Shopping</a>
            <span class="fw-bold text-uppercase tracking-widest text-muted small">Shopping Bag</span>
            <img src="images/image.png" width="50px" onerror="this.style.display='none'"/>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="bg-white p-4 rounded shadow-sm">
                    <h5 class="fw-bold mb-4">Items in Bag (1 Item)</h5>
                    
                    <div class="row align-items-center border rounded p-3 mb-3 bg-light g-3">
                        <div class="col-3 col-md-2 text-center">
                            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=150&q=80" class="img-fluid rounded border shadow-sm">
                        </div>
                        <div class="col-9 col-md-6">
                            <h6 class="fw-bold mb-0">Puma Premium</h6>
                            <p class="text-muted small text-truncate mb-1">Unisex Active Running Wear Edition</p>
                            <div class="d-flex gap-2 align-items-center">
                                <span class="fw-bold text-danger">₹2,499</span>
                                <span class="text-muted text-decoration-line-through small">₹4,999</span>
                            </div>
                        </div>
                        <div class="col-6 col-md-2 text-center">
                            <span class="badge bg-secondary p-2">Qty: 1</span>
                        </div>
                        <div class="col-6 col-md-2 text-end">
                            <a href="#" class="btn btn-sm btn-link text-danger"><i class="bi bi-trash fs-5"></i></a>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="bg-white p-4 rounded shadow-sm border border-light">
                    <h6 class="fw-bold text-muted text-uppercase mb-3 small">Price Details</h6>
                    <div class="d-flex justify-content-between my-2 text-secondary">
                        <span>Total MRP</span>
                        <span>₹4,999</span>
                    </div>
                    <div class="d-flex justify-content-between my-2 text-success">
                        <span>Discount on MRP</span>
                        <span>-₹2,500</span>
                    </div>
                    <div class="d-flex justify-content-between my-2 text-secondary">
                        <span>Convenience Fee</span>
                        <strong class="text-success">FREE</strong>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between my-3 fw-bold fs-5 text-dark">
                        <span>Total Amount</span>
                        <span>₹2,499</span>
                    </div>
                    <a href="index.html" class="btn bg-orange w-100 py-2 fw-bold text-uppercase" onclick="alert('Order placed successfully!')">Place Order</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
